<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .calculator {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input, select {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
            text-align: center;
        }

        button {
            width: 80%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #444;
        }
    </style>

</head>
<body>

    <div class="calculator">
        <h2>The Calculator of Yossef</h2>

        <input type="number" id="num1" placeholder="First number">

        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
        </select>

        <input type="number" id="num2" placeholder="Second number">

        <button onclick="calculate()">=</button>

        <div class="result">
            Result: <span id="result">0</span>
        </div>
    </div>

    <script>
        function calculate() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            let operator = document.getElementById("operator").value;
            let result;

            if (isNaN(num1) || isNaN(num2)) {
                result = "Enter numbers!";
            } else if (operator === "+") {
                result = num1 + num2;
            } else if (operator === "-") {
                result = num1 - num2;
            } else if (operator === "*") {
                result = num1 * num2;
            }

            document.getElementById("result").innerText = result;
        }
    </script>

    <footer style="margin-top: 30px;">
    <p>
        Connect with me on 
        <a href="www.linkedin.com/in/yossef-garavani" target="_blank" style="color:#667eea; font-weight:bold;">
            LinkedIn
        </a>
    </p>
</footer>

</body>
</html>
